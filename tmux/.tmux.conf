bind r source-file ~/.tmux.conf \; display "Reloaded config"

# display
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

set -g set-titles on
set -g monitor-activity on
set -g visual-activity on
set -g focus-events on

set -g display-panes-time 2000
set -g display-time 1000
set -g status-interval 10

setw -g automatic-rename on

# no bells
set -g bell-action none

# history
set -g history-limit 10000

# inputs
set -g mouse on
set -g set-clipboard on
set -g allow-passthrough on

# window numbering
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# buffers
bind b list-buffers
bind p paste-buffer
bind P choose-buffer

# vim keys
setw -g mode-keys vi
set -g status-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X begin-selection \; send -X rectangle-toggle
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi Escape send -X clear-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

bind -r k select-pane -U  # move up
bind -r j select-pane -D  # move down
bind -r h select-pane -L  # move left
bind -r l select-pane -R  # move right

# panes/windows
bind -r x kill-pane

bind '"' split-window -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

##############
# Status bar
##############

# Colour palette
%hidden C1="#1A1A1A"
%hidden C2="#2b2b2b"
%hidden C3="#3a3a3a"
%hidden C4="#8fbf7f"
%hidden C5="#cae982"
%hidden C6="#e3e0d7"
%hidden C7="#9c998e"
%hidden C8="#7d7b75"
%hidden C9="#f4bf75"

# Arrow symbols (requires nerd font)
%hidden R_ARROW="\ue0b0"
%hidden R_ARROW_THIN="\ue0b1"
%hidden L_ARROW="\ue0b2"
%hidden L_ARROW_THIN="\ue0b3"

# General
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#{C1},fg=#{C7}"

# Left status
set -g status-left-length 60
set -g status-left "\
#[bg=#{C6},fg=#{C1},bold] #S \
#[bg=#{C3},fg=#{C6},nobold]#{R_ARROW}\
#[bg=#{C1},fg=#{C3}]#{R_ARROW}"

# Right status
set -g status-right-length 80
set -g status-right "\
#[bg=#{C1},fg=#{C2}]#{L_ARROW}\
#[bg=#{C2},fg=#{C8}] #(uptime -p 2>/dev/null | sed 's/up //' | sed -E 's/ minutes?/m/' | sed -E 's/ hours?/h/' | sed -E 's/ days?/d/' | sed 's/,//g') \
#[bg=#{C1},fg=#{C4}]#{L_ARROW}\
#[bg=#{C4},fg=#{C1},bold] #(cut -d' ' -f1-3 /proc/loadavg 2>/dev/null || sysctl -n vm.loadavg 2>/dev/null | tr -d '{}' | awk '{print $1,$2,$3}') \
#[bg=#{C4},fg=#{C2}]#{L_ARROW}\
#[bg=#{C2},fg=#{C7},nobold] %Y-%m-%d \
#[bg=#{C2},fg=#{C8}]#{L_ARROW_THIN}\
#[bg=#{C2},fg=#{C6},bold] %H:%M \
#[bg=#{C3},fg=#{C6}]#{L_ARROW}\
#[bg=#{C6},fg=#{C1},bold] #h "

# Window list
setw -g window-status-current-style "bg=#{C2},fg=#{C6}"
setw -g window-status-current-format \
"#[bg=#{C4},fg=#{C1}]#{R_ARROW}\
#[bg=#{C4},fg=#{C1},bold] #I \
#[bg=#{C4},fg=#{C2}]#{R_ARROW_THIN}\
#[bg=#{C4},fg=#{C1},bold] #W \
#[bg=#{C1},fg=#{C4}]#{R_ARROW}"

setw -g window-status-separator ""
setw -g window-status-style "bg=#{C2},fg=#{C4}"
setw -g window-status-format \
"#[bg=#{C2},fg=#{C1}]#{R_ARROW}\
#[bg=#{C2},fg=#{?window_activity_flag,#{C9},#{C4}}] #I \
#[bg=#{C2},fg=#{?window_activity_flag,#{C9},#{C4}}]#{R_ARROW_THIN}\
#[bg=#{C2},fg=#{?window_activity_flag,#{C9},#{C4}}] #W \
#[bg=#{C1},fg=#{C2}]#{R_ARROW}"

setw -g window-status-activity-style "bg=#{C2},fg=#{C9}"

# Pane borders
set -g pane-border-style "fg=#{C3}"
set -g pane-active-border-style "fg=#{C4}"

# Message / command bar
set -g message-style "bg=#{C4},fg=#{C1},bold"
set -g message-command-style "bg=#{C3},fg=#{C7}"

# Copy mode highlight
setw -g mode-style "bg=#{C4},fg=#{C1},bold"
